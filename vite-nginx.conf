server {
    listen 80;

    location = / {
        return 301 /consumption_tracker/;
    }

    location /consumption_tracker/api/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /consumption_tracker/ {
        alias /usr/share/nginx/html/consumption_tracker/;
        index index.html;
        try_files $uri $uri/ /consumption_tracker/index.html;
    }

    error_page 404 /consumption_tracker/index.html;
}
